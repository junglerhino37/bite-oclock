name: CI

on:
  push:
    branches: [main]
  pull_request:

# SECURITY: fork PRs run with no secrets. Never switch this workflow to
# pull_request_target with a checkout of fork code.
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build
